<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>音ゲー課題曲フィルタ</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:16px;background:#f7f7f7;color:#222}
    .app{max-width:1100px;margin:0 auto}
    h1{font-size:20px;margin:0 0 12px}
    .panel,.list{background:#fff;border:1px solid #ddd;border-radius:12px;padding:12px;margin-bottom:12px}
    .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
    fieldset{border:1px solid #ddd;border-radius:10px;padding:10px 12px;min-width:220px}
    legend{padding:0 6px;font-weight:700}
    label{display:inline-flex;gap:6px;align-items:center;margin:4px 10px 4px 0}
    input[type="text"]{width:min(100%,360px);padding:10px;border:1px solid #ccc;border-radius:8px}
    button{padding:10px 14px;border:1px solid #bbb;border-radius:8px;background:#fafafa;cursor:pointer}
    button:hover{background:#f0f0f0}
    .meta{font-size:14px;color:#555}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}
    .tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{font-size:12px;background:#eef3ff;border:1px solid #d8e2ff;border-radius:999px;padding:3px 8px}
    .tag.pop{background:#fff3d9;border-color:#ffe0a3}
    .tag.spec{background:#ffe1e1;border-color:#ffb8b8}
    .tag.lv{background:#e8f7ea;border-color:#cbeccf}
    .muted{color:#777}
    .level-info{display:flex;align-items:center;gap:8px;white-space:nowrap}
    .level-raw{font-size:12px}
    .controls{margin-bottom:10px}
    .toggle{display:inline-flex;gap:8px;align-items:center}
    .list{overflow-x:auto}
    .vote-actions{display:inline-flex;gap:6px;align-items:center;white-space:nowrap}
    .vote-btn{padding:6px 9px;font-size:12px;line-height:1.2;white-space:nowrap}
    .vote-btn.active{background:#dff3ff;border-color:#87cfff;font-weight:700}
    @media (max-width:700px){fieldset{min-width:100%}th:nth-child(3),td:nth-child(3){display:none}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <h1>音ゲー課題曲フィルタ</h1>
  <div class="panel controls">
    <div class="row">
      <input id="q" type="text" placeholder="曲名を検索">
      <button id="clear">全解除</button>
      <div class="toggle"><span>ジャンル条件</span><button id="mode" type="button">OR</button></div>
      <div class="meta" id="count">0件</div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <fieldset>
        <legend>ジャンル</legend>
        <label><input type="checkbox" class="genre" value="notes">notes(tmsk)</label>
        <label><input type="checkbox" class="genre" value="peak">peak(とーる)</label>
        <label><input type="checkbox" class="genre" value="one-hand">one-hand(nie)</label>
        <label><input type="checkbox" class="genre" value="tsumami">tsumami(nie, tmsk)</label>
        <label><input type="checkbox" class="genre" value="hand-trip">hand-trip(とーる)</label>
        <label><input type="checkbox" class="genre" value="tricky">tricky(-)</label>
        <label><input type="checkbox" class="genre" value="namco">namco</label>
      </fieldset>
      <fieldset>
        <legend>Popular</legend>
        <label><input type="checkbox" id="popular">popular</label>
      </fieldset>
      <fieldset>
        <legend>本戦課題曲</legend>
        <label><input type="checkbox" id="special">本戦課題曲</label>
      </fieldset>
      <fieldset>
        <legend>レベル</legend>
        <label><input type="checkbox" class="level" value="17.0">17.0</label>
        <label><input type="checkbox" class="level" value="17.5">17.5</label>
        <label><input type="checkbox" class="level" value="18.0-18.5">18.0〜18.5</label>
        <label><input type="checkbox" class="level" value="18.6-18.9">18.6〜18.9</label>
      </fieldset>
      <fieldset>
        <legend>自分の投票</legend>
        <label><input type="checkbox" class="vote-filter" value="no-chart">譜面無い</label>
        <label><input type="checkbox" class="vote-filter" value="need-practice">要対策</label>
        <label><input type="checkbox" class="vote-filter" value="unvoted">未投票</label>
      </fieldset>
      <fieldset>
        <legend>みんなの投票</legend>
        <label><input type="checkbox" class="all-vote-filter" value="no-chart">譜面無い</label>
        <label><input type="checkbox" class="all-vote-filter" value="need-practice">要対策</label>
      </fieldset>
    </div>
  </div>

  <div class="list">
    <table>
      <thead><tr><th>曲名</th><th>タグ</th><th>レベル</th><th>投票</th><th>担当</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
let songs = [];

async function loadSongs(){
  try{
    const res = await fetch('./songs.json');
    songs = await res.json();
    render();
  }catch(err){
    console.error(err);
    tbody.innerHTML = '<tr><td colspan="5" class="muted">songs.json の読み込みに失敗しました</td></tr>';
    count.textContent = '読み込み失敗';
  }
}

const levelBucket = v => {
  if(v === 17.0) return '17.0';
  if(v === 17.5) return '17.5';
  if(v >= 18.0 && v <= 18.5) return '18.0-18.5';
  if(v >= 18.6 && v <= 18.9) return '18.6-18.9';
  return 'unknown';
};
const tbody = document.getElementById('tbody');
const count = document.getElementById('count');
const q = document.getElementById('q');
const modeBtn = document.getElementById('mode');
let genreMode = 'OR';

const SUPABASE_URL = 'https://dnxzzspcpbysgfcwettc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uiL57OEEf1NddK_bfpgjbQ_HYQPBuz6';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const VOTER_ID_STORAGE_KEY = 'tpl-genre-checker-voter-id-v1';
const POLL_INTERVAL_MS = 15000;

let votes = {};
let voteCountsByChart = {};
let assignments = {};
let assignmentCountsByChart = {};
const voterId = getOrCreateVoterId();

function getOrCreateVoterId(){
  const saved = localStorage.getItem(VOTER_ID_STORAGE_KEY);

  if(saved){
    return saved;
  }

  const id = crypto.randomUUID
    ? crypto.randomUUID()
    : `voter-${Date.now()}-${Math.random().toString(36).slice(2)}`;

  localStorage.setItem(VOTER_ID_STORAGE_KEY, id);

  return id;
}

function chartKey(song){
  const match = String(song.url || '').match(/\/s\/([^/]+)\/([^/]+)\//);

  if(match){
    return `${match[1]}-${match[2]}`;
  }

  return `${song.title}@@${Number(song.levelRaw).toFixed(1)}`;
}

function escapeAttr(value){
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function emptyVoteCounts(){
  return {
    noChart: 0,
    needPractice: 0
  };
}

function getVoteCounts(song){
  return voteCountsByChart[chartKey(song)] || emptyVoteCounts();
}

function addVoteCount(key, vote, amount){
  if(vote !== 'no-chart' && vote !== 'need-practice'){
    return;
  }

  if(!voteCountsByChart[key]){
    voteCountsByChart[key] = emptyVoteCounts();
  }

  if(vote === 'no-chart'){
    voteCountsByChart[key].noChart = Math.max(0, voteCountsByChart[key].noChart + amount);
  }

  if(vote === 'need-practice'){
    voteCountsByChart[key].needPractice = Math.max(0, voteCountsByChart[key].needPractice + amount);
  }
}

function applyOptimisticVote(key, beforeVote, afterVote){
  if(beforeVote === afterVote){
    return;
  }

  addVoteCount(key, beforeVote, -1);
  addVoteCount(key, afterVote, 1);
}

async function loadVotesFromSupabase(){
  const { data, error } = await supabaseClient
    .from('votes')
    .select('chart_key,voter_id,vote');

  if(error){
    console.error('投票データの読み込みに失敗しました', error);
    return;
  }

  const nextVotes = {};
  const nextCounts = {};

  for(const row of data || []){
    if(row.vote === 'no-chart' || row.vote === 'need-practice'){
      if(!nextCounts[row.chart_key]){
        nextCounts[row.chart_key] = emptyVoteCounts();
      }

      if(row.vote === 'no-chart'){
        nextCounts[row.chart_key].noChart++;
      }

      if(row.vote === 'need-practice'){
        nextCounts[row.chart_key].needPractice++;
      }
    }

    if(row.voter_id === voterId){
      if(row.vote === 'no-chart' || row.vote === 'need-practice'){
        nextVotes[row.chart_key] = row.vote;
      }
    }
  }

  votes = nextVotes;
  voteCountsByChart = nextCounts;

  render();
}

async function setVote(key, value){
  const beforeVote = votes[key] || 'none';
  const afterVote = beforeVote === value ? 'none' : value;

  if(afterVote === 'none'){
    delete votes[key];
  }else{
    votes[key] = afterVote;
  }

  applyOptimisticVote(key, beforeVote, afterVote);
  render();

  const { error } = await supabaseClient
    .from('votes')
    .upsert({
      chart_key: key,
      voter_id: voterId,
      vote: afterVote,
      updated_at: new Date().toISOString()
    }, {
      onConflict: 'chart_key,voter_id'
    });

  if(error){
    console.error('投票の保存に失敗しました', error);
    alert('投票の保存に失敗しました。少し待ってから再読み込みしてください。');
    await loadVotesFromSupabase();
    return;
  }

  await loadVotesFromSupabase();
}

function renderVoteControls(song){
  const key = chartKey(song);
  const currentVote = votes[key] || '';
  const counts = getVoteCounts(song);
  const escapedKey = escapeAttr(key);

  return `
    <div class="vote-actions">
      <button
        class="vote-btn ${currentVote === 'no-chart' ? 'active' : ''}"
        type="button"
        data-vote-key="${escapedKey}"
        data-vote-value="no-chart"
      >譜面無い ${counts.noChart}</button>
      <button
        class="vote-btn ${currentVote === 'need-practice' ? 'active' : ''}"
        type="button"
        data-vote-key="${escapedKey}"
        data-vote-value="need-practice"
      >要対策 ${counts.needPractice}</button>
    </div>
  `;
}

function emptyAssignmentCounts(){
  return {
    giveUp: 0,
    take: 0
  };
}

function getAssignmentCounts(song){
  return assignmentCountsByChart[chartKey(song)] || emptyAssignmentCounts();
}

function addAssignmentCount(key, assignment, amount){
  if(assignment !== 'give-up' && assignment !== 'take'){
    return;
  }

  if(!assignmentCountsByChart[key]){
    assignmentCountsByChart[key] = emptyAssignmentCounts();
  }

  if(assignment === 'give-up'){
    assignmentCountsByChart[key].giveUp = Math.max(0, assignmentCountsByChart[key].giveUp + amount);
  }

  if(assignment === 'take'){
    assignmentCountsByChart[key].take = Math.max(0, assignmentCountsByChart[key].take + amount);
  }
}

function applyOptimisticAssignment(key, beforeAssignment, afterAssignment){
  if(beforeAssignment === afterAssignment){
    return;
  }

  addAssignmentCount(key, beforeAssignment, -1);
  addAssignmentCount(key, afterAssignment, 1);
}

async function loadAssignmentsFromSupabase(){
  const { data, error } = await supabaseClient
    .from('assignments')
    .select('chart_key,voter_id,assignment');

  if(error){
    console.error('担当データの読み込みに失敗しました', error);
    return;
  }

  const nextAssignments = {};
  const nextCounts = {};

  for(const row of data || []){
    if(row.assignment === 'give-up' || row.assignment === 'take'){
      if(!nextCounts[row.chart_key]){
        nextCounts[row.chart_key] = emptyAssignmentCounts();
      }

      if(row.assignment === 'give-up'){
        nextCounts[row.chart_key].giveUp++;
      }

      if(row.assignment === 'take'){
        nextCounts[row.chart_key].take++;
      }
    }

    if(row.voter_id === voterId){
      if(row.assignment === 'give-up' || row.assignment === 'take'){
        nextAssignments[row.chart_key] = row.assignment;
      }
    }
  }

  assignments = nextAssignments;
  assignmentCountsByChart = nextCounts;

  render();
}

async function setAssignment(key, value){
  const beforeAssignment = assignments[key] || 'none';
  const afterAssignment = beforeAssignment === value ? 'none' : value;

  if(afterAssignment === 'none'){
    delete assignments[key];
  }else{
    assignments[key] = afterAssignment;
  }

  applyOptimisticAssignment(key, beforeAssignment, afterAssignment);
  render();

  const { error } = await supabaseClient
    .from('assignments')
    .upsert({
      chart_key: key,
      voter_id: voterId,
      assignment: afterAssignment,
      updated_at: new Date().toISOString()
    }, {
      onConflict: 'chart_key,voter_id'
    });

  if(error){
    console.error('担当の保存に失敗しました', error);
    alert('担当の保存に失敗しました。少し待ってから再読み込みしてください。');
    await loadAssignmentsFromSupabase();
    return;
  }

  await loadAssignmentsFromSupabase();
}

function renderAssignmentControls(song){
  const key = chartKey(song);
  const currentAssignment = assignments[key] || '';
  const counts = getAssignmentCounts(song);
  const escapedKey = escapeAttr(key);

  return `
    <div class="vote-actions">
      <button
        class="vote-btn ${currentAssignment === 'give-up' ? 'active' : ''}"
        type="button"
        data-assignment-key="${escapedKey}"
        data-assignment-value="give-up"
      >お手上げ ${counts.giveUp}</button>
      <button
        class="vote-btn ${currentAssignment === 'take' ? 'active' : ''}"
        type="button"
        data-assignment-key="${escapedKey}"
        data-assignment-value="take"
      >任せて ${counts.take}</button>
    </div>
  `;
}

function selected(cls){
  return [...document.querySelectorAll('.' + cls + ':checked')].map(x => x.value);
}

function checked(id){
  return document.getElementById(id).checked;
}

function render(){
  const qs = q.value.trim().toLowerCase();
  const genres = selected('genre');
  const levels = selected('level');
  const voteFilters = selected('vote-filter');
  const allVoteFilters = selected('all-vote-filter');
  const usePop = checked('popular');
  const useSpec = checked('special');

  const filtered = songs.filter(s => {
    if(qs && !s.title.toLowerCase().includes(qs)) return false;

    if(genres.length){
      const hit = genres.filter(g => s.genres.includes(g));
      if(genreMode === 'OR' ? hit.length === 0 : hit.length !== genres.length) return false;
    }

    if(usePop && !s.popular) return false;
    if(useSpec && !s.special) return false;
    if(levels.length && !levels.includes(levelBucket(s.levelRaw))) return false;

    if(voteFilters.length){
      const myVote = votes[chartKey(s)] || 'unvoted';

      if(!voteFilters.includes(myVote)){
        return false;
      }
    }

    if(allVoteFilters.length){
      const counts = getVoteCounts(s);
      const hasAllVote =
        (allVoteFilters.includes('no-chart') && counts.noChart > 0) ||
        (allVoteFilters.includes('need-practice') && counts.needPractice > 0);

      if(!hasAllVote){
        return false;
      }
    }

    return true;
  });

  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td>${s.url ? `<a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.title}</a>` : s.title}</td>
      <td>
        <div class="tags">
          ${s.genres.map(g => `<span class="tag">${g}</span>`).join('')}
          ${s.popular ? '<span class="tag pop">popular</span>' : ''}
          ${s.special ? '<span class="tag spec">本戦課題曲</span>' : ''}
        </div>
      </td>
      <td>
        <div class="level-info">
          <span class="tag lv">${levelBucket(s.levelRaw)}</span>
          <span class="muted level-raw">raw: ${s.levelRaw.toFixed(1)}</span>
        </div>
      </td>
      <td>${renderVoteControls(s)}</td>
      <td>${renderAssignmentControls(s)}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="muted">該当なし</td></tr>';

  count.textContent = `${filtered.length}件 / ${songs.length}件`;
}

modeBtn.onclick = () => {
  genreMode = genreMode === 'OR' ? 'AND' : 'OR';
  modeBtn.textContent = genreMode;
  render();
};

document.getElementById('clear').onclick = () => {
  q.value = '';
  document.querySelectorAll('input[type=checkbox]').forEach(x => x.checked = false);
  genreMode = 'OR';
  modeBtn.textContent = 'OR';
  render();
};

[q, ...document.querySelectorAll('input[type=checkbox]')].forEach(el => {
  el.addEventListener('input', render);
});

tbody.addEventListener('click', event => {
  const voteButton = event.target.closest('[data-vote-key]');

  if(voteButton){
    setVote(voteButton.dataset.voteKey, voteButton.dataset.voteValue);
    return;
  }

  const assignmentButton = event.target.closest('[data-assignment-key]');

  if(assignmentButton){
    setAssignment(assignmentButton.dataset.assignmentKey, assignmentButton.dataset.assignmentValue);
  }
});

async function init(){
  await loadSongs();
  await loadVotesFromSupabase();
  await loadAssignmentsFromSupabase();

  setInterval(() => {
    loadVotesFromSupabase();
    loadAssignmentsFromSupabase();
  }, POLL_INTERVAL_MS);
}

init();
</script>
</body>
</html>
